name: Daily Triage (dogfood)

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write
  actions: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Record run start
        id: timing
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            tools/zj-loop-audit/package-lock.json

      - name: Install root workflow script dependencies
        run: npm ci --ignore-scripts

      - name: Build zj-loop-audit
        run: |
          cd tools/zj-loop-audit
          npm ci
          npm run build

      - name: Run reference audit
        id: audit
        run: |
          cd tools/zj-loop-audit
          node dist/cli.js ../.. --json > /tmp/audit.json
          SCORE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/audit.json','utf8')).score)")
          LEVEL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/audit.json','utf8')).level)")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Check workflow health
        id: workflows
        run: |
          FAILING=0
          FAILURES_JSON=$(mktemp)
          printf '[]' > "$FAILURES_JSON"
          for wf in validate-patterns audit; do
            RUN_JSON=$(gh run list --workflow="${wf}.yml" --limit 1 --json conclusion,databaseId,headBranch,headSha,name -q '.[0]' 2>/dev/null || echo "{}")
            STATUS=$(node -e "const r = JSON.parse(process.argv[1] || '{}'); console.log(r.conclusion || 'unknown')" "$RUN_JSON")
            echo "${wf}: ${STATUS}"
            if [ "$STATUS" = "failure" ]; then
              FAILING=$((FAILING + 1))
              node -e "
                const fs = require('fs');
                const path = process.argv[1];
                const run = JSON.parse(process.argv[2] || '{}');
                const workflow = process.argv[3];
                const repo = process.argv[4];
                const failures = JSON.parse(fs.readFileSync(path, 'utf8'));
                const runId = String(run.databaseId || '');
                failures.push({
                  workflow,
                  databaseId: runId,
                  headBranch: run.headBranch || 'main',
                  headSha: run.headSha || '',
                  url: runId ? 'https://github.com/' + repo + '/actions/runs/' + runId : ''
                });
                fs.writeFileSync(path, JSON.stringify(failures));
              " "$FAILURES_JSON" "$RUN_JSON" "$wf" "$GITHUB_REPOSITORY"
            fi
          done
          echo "failing=$FAILING" >> "$GITHUB_OUTPUT"
          echo "failures_json=$(cat "$FAILURES_JSON")" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Route CI failures through route table
        id: route
        env:
          FAILED_WORKFLOWS_JSON: ${{ steps.workflows.outputs.failures_json }}
          ROUTE_DECISION_OUT: /tmp/zj-loop-ci-route-decision.json
        run: node scripts/route-ci-failure.mjs

      - name: Check existing CI Sweeper request
        id: existing_route
        if: steps.route.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --head "${{ github.repository_owner }}:${{ steps.route.outputs.request_branch }}" --base main --state open --json number -q '.[0].number' 2>/dev/null || true)
          ISSUE=$(gh issue list --state open --search "\"${{ steps.route.outputs.dedupe_key }}\"" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "existing_request=PR #${PR}" >> "$GITHUB_OUTPUT"
          elif [ -n "$ISSUE" ] && [ "$ISSUE" != "null" ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "existing_request=issue #${ISSUE}" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
            echo "existing_request=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create CI Sweeper Issue Fix Request
        id: issue_fix_request
        if: steps.route.outputs.dispatch == 'true' && steps.existing_route.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ROUTE_DECISION_PATH: /tmp/zj-loop-ci-route-decision.json
          ISSUE_FIX_REQUEST_BODY_OUT: /tmp/zj-loop-issue-fix-request.md
        run: |
          node scripts/build-ci-issue-fix-request-body.mjs
          TITLE="[Issue Fix Request] ci-sweeper: ${{ steps.route.outputs.source_workflow }} run ${{ steps.route.outputs.source_run_id }}"
          URL=$(gh issue create --title "$TITLE" --body-file "$ISSUE_FIX_REQUEST_BODY_OUT")
          echo "issue_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Update zj-loop/STATE.md
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SCORE="${{ steps.audit.outputs.score }}"
          LEVEL="${{ steps.audit.outputs.level }}"
          FAILING="${{ steps.workflows.outputs.failing }}"
          ROUTE_EVIDENCE=$(node -e "
            const fs = require('fs');
            const path = '/tmp/zj-loop-ci-route-decision.json';
            if (!fs.existsSync(path)) process.exit(0);
            const decision = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!decision.route || decision.status === 'ignored' && decision.reason === 'no-failing-workflows') process.exit(0);
            const evidence = Array.isArray(decision.evidence) && decision.evidence.length ? decision.evidence[0] : decision.source_url;
            const parts = [
              '- Route decision:',
              '`' + decision.status + '`',
              'route `' + decision.route + '`',
              decision.signal_id ? 'signal `' + decision.signal_id + '`' : null,
              decision.requested_action ? 'action `' + decision.requested_action + '`' : null,
              evidence ? 'evidence ' + evidence : null,
            ].filter(Boolean);
            console.log(parts.join('; ') + '.');
          ")
          cat > zj-loop/STATE.md <<EOF
          # Loop State — zagenticloop reference

          Last run: ${DATE} (automated daily-triage workflow)

          ## High Priority (loop is acting or waiting on human)

          - Maintain loop readiness score ≥ 58 (current: **${SCORE}**, level **${LEVEL}**).
          - Keep npm packages current after tool changes (tag \`zj-loop-audit-v*\`, \`zj-loop-init-v*\`, \`zj-loop-cost-v*\` — see docs/RELEASE.md).
          $([ "$FAILING" -gt 0 ] && echo "- **${FAILING}** dogfood workflow(s) failing — investigate CI.")
          $([ "${{ steps.route.outputs.dispatch }}" = "true" ] && echo "- Routed CI failure to CI Sweeper: \`${{ steps.route.outputs.dedupe_key }}\`.")
          $([ -n "${{ steps.issue_fix_request.outputs.issue_url }}" ] && echo "- Issue Fix Request: ${{ steps.issue_fix_request.outputs.issue_url }}.")
          $([ "${{ steps.existing_route.outputs.duplicate }}" = "true" ] && echo "- CI Sweeper duplicate request found: ${{ steps.existing_route.outputs.existing_request }}.")
          ${ROUTE_EVIDENCE}

          ## Watch List

          - Expand contributor failure stories (dependency sweeper, multi-loop).
          - Collect a production story for Post-Merge Cleanup.
          - Validate \`zj-loop-init\` scaffolds on fresh projects across all patterns.

          ## Recent Noise (ignored this run)

          —

          ---
          Run log: Updated by \`.github/workflows/daily-triage.yml\`. See \`zj-loop/ZJ-LOOP.md\` for cadence and gates.
          EOF

      - name: Append zj-loop/zj-loop-run-log.md
        id: runlog
        run: |
          START="${{ steps.timing.outputs.started_at }}"
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DURATION=$(node -e "
            const s = new Date('${START}').getTime();
            const e = new Date('${END}').getTime();
            console.log(Math.max(1, Math.round((e - s) / 1000)));
          ")
          FAILING="${{ steps.workflows.outputs.failing }}"
          SCORE="${{ steps.audit.outputs.score }}"
          if [ "$FAILING" -gt 0 ]; then
            OUTCOME="escalated"
          else
            OUTCOME="report-only"
          fi
          ENTRY=$(node -e "
            console.log(JSON.stringify({
              run_id: '${END}',
              pattern: 'daily-triage',
              duration_s: Number('${DURATION}'),
              items_found: Number('${FAILING}') + 1,
              actions_taken: 1,
              escalations: Number('${FAILING}'),
              tokens_estimate: 52000,
              readiness_score: Number('${SCORE}'),
              outcome: '${OUTCOME}',
              workflow_run: '${{ github.run_id }}'
            }));
          ")
          node scripts/append-run-log.mjs "$ENTRY"
          echo "outcome=${OUTCOME}" >> "$GITHUB_OUTPUT"

      - name: Dispatch CI Sweeper route request
        if: steps.route.outputs.dispatch == 'true' && steps.existing_route.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci-sweeper.yml \
            --ref main \
            -f source_workflow="${{ steps.route.outputs.source_workflow }}" \
            -f source_run_id="${{ steps.route.outputs.source_run_id }}" \
            -f source_url="${{ steps.route.outputs.source_url }}" \
            -f head_branch="${{ steps.route.outputs.head_branch }}" \
            -f head_sha="${{ steps.route.outputs.head_sha }}" \
            -f dedupe_key="${{ steps.route.outputs.dedupe_key }}" \
            -f request_branch="${{ steps.route.outputs.request_branch }}" \
            -f request_issue_url="${{ steps.issue_fix_request.outputs.issue_url }}"

      # These run the SAME gates a PR-triggered workflow would. Their outcomes
      # (not a hardcoded value) drive the commit statuses posted below, so the
      # loop cannot mark its own change green unless the real gates passed.
      - name: Run validate gates (for PR status)
        id: validate_gates
        continue-on-error: true
        run: bash scripts/ci-validate-gates.sh

      - name: Run audit gates (for PR status)
        id: audit_gates
        continue-on-error: true
        run: bash scripts/ci-audit-gates.sh

      - name: Fail the run if either gate failed
        if: steps.validate_gates.outcome == 'failure' || steps.audit_gates.outcome == 'failure'
        run: |
          echo "validate gates: ${{ steps.validate_gates.outcome }}"
          echo "audit gates:    ${{ steps.audit_gates.outcome }}"
          echo "One or more dogfood gates failed — not opening/merging an automated PR."
          exit 1

      - name: Open PR for zj-loop state + run log if changed
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet zj-loop/STATE.md zj-loop/zj-loop-run-log.md; then
            echo "No zj-loop/STATE.md or zj-loop/zj-loop-run-log.md changes — skip PR"
            echo "opened=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="automated/daily-triage-$(date -u +%Y-%m-%d)"
          # Fetch the generated branch only to refresh --force-with-lease metadata.
          # Do not rebase it: daily triage state is regenerated from current main.
          git fetch origin main "$BRANCH" 2>/dev/null || git fetch origin main
          # -B keeps working-tree edits; avoids checkout conflicts with modified loop state.
          git checkout -B "$BRANCH"
          git add zj-loop/STATE.md zj-loop/zj-loop-run-log.md
          git commit -m "chore(loop): daily triage update state + run log [automated]"
          # Daily triage state is generated from the current main run. If the same
          # date branch already exists, replace it instead of rebasing stale state.
          git push -u origin "$BRANCH" --force-with-lease
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "opened=true" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh pr list --head "${{ github.repository_owner }}:${BRANCH}" --base main --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already open"
            PR_NUMBER="$EXISTING"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(loop): daily triage state $(date -u +%Y-%m-%d)" \
              --body "Automated daily triage update from \`daily-triage.yml\`.

          - Loop readiness: **${{ steps.audit.outputs.score }}** (${{ steps.audit.outputs.level }})
          - \`zj-loop/STATE.md\` updated
          - \`zj-loop/zj-loop-run-log.md\` appended (\`${{ steps.runlog.outputs.outcome }}\`)
          - \`validate\` and \`audit\` statuses posted inline (GITHUB_TOKEN does not trigger PR workflows)."
            PR_NUMBER=$(gh pr view "$BRANCH" --json number -q '.number')
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Post required commit statuses for branch protection
        if: steps.pr.outputs.opened == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const sha = '${{ steps.pr.outputs.head_sha }}';
            if (!sha) {
              core.setFailed('Missing head_sha for commit statuses');
              return;
            }
            const toState = (outcome) => (outcome === 'success' ? 'success' : 'failure');
            const checks = [
              {
                context: 'validate',
                description: 'Pattern/registry gates (daily-triage inline)',
                state: toState('${{ steps.validate_gates.outcome }}'),
              },
              {
                context: 'audit',
                description: 'Loop readiness gates (daily-triage inline)',
                state: toState('${{ steps.audit_gates.outcome }}'),
              },
            ];
            for (const check of checks) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: check.state,
                context: check.context,
                description: check.description,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            }

      - name: Merge automated daily triage PR
        if: steps.pr.outputs.opened == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch

      - name: Open weekly loop report issue (Mondays)
        if: github.event.schedule == '0 8 * * 1-5' && format('{0}', github.run_attempt) == '1'
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" != "1" ]; then echo "Not Monday — skip issue"; exit 0; fi
          EXISTING=$(gh issue list --label "loop-report" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Open loop-report issue #$EXISTING exists"
            exit 0
          fi
          gh label create "loop-report" --color "3ee8c5" --description "Weekly loop triage report" 2>/dev/null || true
          gh issue create \
            --title "Loop report — week of $(date -u +%Y-%m-%d)" \
            --label "loop-report" \
            --body "## Automated daily triage summary

          - Loop readiness: **${{ steps.audit.outputs.score }}** (${{ steps.audit.outputs.level }})
          - Latest run outcome: \`${{ steps.runlog.outputs.outcome }}\` (see \`zj-loop/zj-loop-run-log.md\`)
          - See updated \`zj-loop/STATE.md\` on main after PR merge
          - Review high-priority items and close or re-prioritize

          _Generated by daily-triage workflow. Human reviews and decides actions._"
        env:
          GH_TOKEN: ${{ github.token }}
