name: Validate Patterns & Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # completion delta gate compares the checked-out commit with HEAD^.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run validate gates
        run: bash scripts/ci-validate-gates.sh
