# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-ci-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: d7db94bc130dc0c6

name: ZJ Loop CI Sweeper

on:
  workflow_run:
    workflows: ['*']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: read
  issues: write

jobs:
  sweep:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - name: CI sweeper route evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'manual' }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
          SOURCE_URL: ${{ github.event.workflow_run.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          printf '## ZJ Loop CI Sweeper\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf 'Signal: workflow failure or manual smoke for `ci-sweeper`.\n\n' >> "$GITHUB_STEP_SUMMARY"
          npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-route dispatch ci-sweeper --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-ci-sweeper plan --json > consumer-plan.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-ci-sweeper repair-plan --json > repair-plan.json || true
          ROUTE_ALLOWED="$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('route-decision.json','utf8')); process.stdout.write(String(p.allowed === true))")"
          if [ "$ROUTE_ALLOWED" = "true" ]; then
            npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-ci-sweeper request-body \
              --route-decision route-decision.json \
              --repo "${{ github.repository }}" \
              --workflow "$WORKFLOW_NAME" \
              --run-id "$SOURCE_RUN_ID" \
              --source-url "$SOURCE_URL" \
              --out issue-fix-request.md \
              --json > issue-fix-request-result.json
            gh issue create \
              --title "[Issue Fix Request] ci-sweeper: ${WORKFLOW_NAME} ${SOURCE_RUN_ID}" \
              --body-file issue-fix-request.md > issue-fix-request-url.txt
            printf 'Created durable GitHub Issue Fix Request carrier.\n\n' >> "$GITHUB_STEP_SUMMARY"
            printf '### Issue Fix Request\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat issue-fix-request-result.json >> "$GITHUB_STEP_SUMMARY"
            printf '\nIssue Fix Request: ' >> "$GITHUB_STEP_SUMMARY"
            cat issue-fix-request-url.txt >> "$GITHUB_STEP_SUMMARY"
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Route was not allowed. No issue was created.\n\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          printf '### Route Decision\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Consumer Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Repair Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat repair-plan.json >> "$GITHUB_STEP_SUMMARY"
