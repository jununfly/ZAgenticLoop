# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-daily-triage
# zj-loop-template-version: 1
# zj-loop-template-hash: c972c6ce068661f2

name: ZJ Loop Daily Triage

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.19 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - name: Gather recent workflow context
        run: gh run list --limit 10 --json conclusion,name,headBranch,createdAt || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report-only route evidence
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.19 zj-loop-route dispatch daily-triage-report --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.19 zj-loop-consumer plan daily-triage-report --json > consumer-plan.json || true
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
