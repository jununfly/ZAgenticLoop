# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-dependency-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: 0649642e5729ff21

name: ZJ Loop Dependency Sweeper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      issue_fix_request_json:
        description: 'Consumed Issue Fix Request JSON'
        required: false
        default: ''
      confirm_live_repair:
        description: 'Optional fixed phrase for live Dependency Sweeper repair'
        required: false
        default: ''
      core_package:
        description: 'Core package spec; use ./tools/zj-loop-core for unreleased repo dogfood'
        required: false
        default: '@jununfly/zj-loop-core@0.1.8'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure repair commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install local core package dependencies
        if: ${{ startsWith(inputs.core_package, './') }}
        run: npm install --prefix "${{ inputs.core_package }}"

      - name: Dependency sweeper route evidence
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_FIX_REQUEST_JSON: ${{ inputs.issue_fix_request_json }}
          CONFIRM_LIVE_REPAIR: ${{ inputs.confirm_live_repair }}
          ZJ_LOOP_CORE_PACKAGE: ${{ inputs.core_package || '@jununfly/zj-loop-core@0.1.8' }}
        run: |
          npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-route dispatch dependency-sweeper --json > route-decision.json || true
          npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-dependency-sweeper plan --json > consumer-plan.json || true
          if [ -n "$ISSUE_FIX_REQUEST_JSON" ]; then
            printf '%s\n' "$ISSUE_FIX_REQUEST_JSON" > issue-fix-request.json
            npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-dependency-sweeper repair-plan --request issue-fix-request.json --json > repair-plan.json || true
            [ -f repair-plan.json ] && cat repair-plan.json >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$CONFIRM_LIVE_REPAIR" ]; then
              REPAIR_BRANCH="$(jq -r '.branch // empty' repair-plan.json)"
              EXISTING_REPAIR_PR=""
              if [ -n "$REPAIR_BRANCH" ]; then
                EXISTING_REPAIR_PR="$(gh pr list --head "$REPAIR_BRANCH" --base main --state open --json url --jq '.[0].url' 2>/dev/null || true)"
                [ -n "$EXISTING_REPAIR_PR" ] || git fetch origin "$REPAIR_BRANCH" || true
              fi
              args=(
                zj-loop-dependency-sweeper live-repair
                --request issue-fix-request.json \
                --confirm-live-repair "$CONFIRM_LIVE_REPAIR" \
                --out live-repair-result.json \
                --json
              )
              if [ -n "$EXISTING_REPAIR_PR" ]; then
                args+=(--existing-repair-pr-url "$EXISTING_REPAIR_PR")
              fi
              npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" "${args[@]}" || true
              printf '\n\n### Live Repair Result\n\n' >> "$GITHUB_STEP_SUMMARY"
              [ -f live-repair-result.json ] && cat live-repair-result.json >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          [ -f route-decision.json ] && cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          [ -f consumer-plan.json ] && cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Dependency Sweeper evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-dependency-sweeper-${{ github.run_id }}
          path: |
            route-decision.json
            consumer-plan.json
            issue-fix-request.json
            repair-plan.json
            live-repair-result.json
          if-no-files-found: ignore
