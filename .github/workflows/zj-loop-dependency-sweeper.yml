# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-dependency-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: c289a3c77ae444b6

name: ZJ Loop Dependency Sweeper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      issue_fix_request_json:
        description: 'Consumed Issue Fix Request JSON'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency sweeper route evidence
        env:
          ISSUE_FIX_REQUEST_JSON: ${{ inputs.issue_fix_request_json }}
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch dependency-sweeper --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-dependency-sweeper plan --json > consumer-plan.json || true
          if [ -n "$ISSUE_FIX_REQUEST_JSON" ]; then
            printf '%s\n' "$ISSUE_FIX_REQUEST_JSON" > issue-fix-request.json
            npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-dependency-sweeper repair-plan --request issue-fix-request.json --json > repair-plan.json || true
            cat repair-plan.json >> "$GITHUB_STEP_SUMMARY"
          fi
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
