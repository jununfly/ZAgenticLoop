# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-issue-triage
# zj-loop-template-version: 1
# zj-loop-template-hash: 16e8c145312340e7

name: ZJ Loop Issue Triage

on:
  issues:
    types: [opened, reopened, labeled]
  schedule:
    - cron: '0 */2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Issue triage route evidence
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-route dispatch issue-triage-report --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-consumer plan issue-triage-report --json > consumer-plan.json || true
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
