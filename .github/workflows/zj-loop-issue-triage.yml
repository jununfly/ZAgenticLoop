# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-issue-triage
# zj-loop-template-version: 1
# zj-loop-template-hash: d66a9fcc44e9bdff

name: ZJ Loop Issue Triage

on:
  issues:
    types: [opened, reopened, labeled]
  schedule:
    - cron: '0 */2 * * 1-5'
  workflow_dispatch:
    inputs:
      triage_action_request_json:
        description: 'Issue Triage Action Request JSON'
        required: false
        default: ''
      triage_transition_request_json:
        description: 'Recommended Triage Transition JSON'
        required: false
        default: ''
      triage_transition_confirmation:
        description: 'Fixed confirmation phrase for confirmed triage transition'
        required: false
        default: ''

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - name: Issue triage route evidence
        env:
          GH_TOKEN: ${{ github.token }}
          TRIAGE_ACTION_REQUEST_JSON: ${{ inputs.triage_action_request_json }}
          TRIAGE_TRANSITION_REQUEST_JSON: ${{ inputs.triage_transition_request_json }}
          TRIAGE_TRANSITION_CONFIRMATION: ${{ inputs.triage_transition_confirmation }}
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-route dispatch issue-backlog-triage --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-consumer plan issue-backlog-triage --json > consumer-plan.json || true
          if [ -n "$TRIAGE_ACTION_REQUEST_JSON" ]; then
            printf '%s\n' "$TRIAGE_ACTION_REQUEST_JSON" > triage-action-request.json
            npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-issue-triage-action action-plan \
              --request triage-action-request.json \
              --json > action-plan.json || true
            cat action-plan.json >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$TRIAGE_TRANSITION_REQUEST_JSON" ]; then
            printf '%s\n' "$TRIAGE_TRANSITION_REQUEST_JSON" > triage-transition-request.json
            if ! jq -e --arg repository "$GITHUB_REPOSITORY" '
              .schema == "zj-loop.recommended_triage_transition.v1"
              and (.request_id | type == "string" and length > 0)
              and (.source.tracker == "github")
              and (.source.repo == $repository)
              and (.source.issue | type == "number" and . > 0)
            ' triage-transition-request.json >/dev/null; then
              jq -n '{schema: "zj-loop.issue-triage-transition-preflight.v1", status: "rejected", reason: "invalid-transition-request"}' > transition-plan.json
              cat transition-plan.json >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-issue-triage-transition confirm-plan \
              --request triage-transition-request.json \
              --confirmation-phrase "$TRIAGE_TRANSITION_CONFIRMATION" \
              --json > transition-plan.json || true
            cat transition-plan.json >> "$GITHUB_STEP_SUMMARY"
            if jq -e '.decision.status == "confirmed" and .confirmed_transition.issue_fix_request != null' transition-plan.json >/dev/null; then
              npx --yes --package @jununfly/zj-loop-core@0.1.22 zj-loop-issue-triage-transition request-body \
                --transition-plan transition-plan.json \
                --out issue-fix-request-body.md \
                --title-out issue-fix-request-title.txt \
                --json > issue-fix-request-body-result.json
              REQUEST_ID="$(jq -r '.confirmed_transition.issue_fix_request.request_id' transition-plan.json)"
              SOURCE_ISSUE="$(jq -r '.confirmed_transition.issue_fix_request.source_signal.issue' transition-plan.json)"
              EXISTING_URL="$(gh issue view "$SOURCE_ISSUE" --json comments --jq ".comments[] | select((.body | contains(\"<!-- zj-loop:issue-fix-request\")) and (.body | contains(\"${REQUEST_ID}\"))) | .url" | head -n 1)"
              if [ -n "$EXISTING_URL" ]; then
                printf '\nExisting source issue Issue Fix Request comment: %s\n' "$EXISTING_URL" >> "$GITHUB_STEP_SUMMARY"
              else
                COMMENT_URL="$(gh issue comment "$SOURCE_ISSUE" --body-file issue-fix-request-body.md)"
                printf '\nCreated source issue Issue Fix Request comment: %s\n' "$COMMENT_URL" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
