name: ZJ Loop Post-Merge Cleanup

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Post-merge cleanup route evidence
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-route dispatch post-merge-roadmap-closeout --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-post-merge-closeout plan --json > consumer-plan.json || true
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
