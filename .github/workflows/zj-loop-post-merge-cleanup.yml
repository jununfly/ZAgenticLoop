# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-post-merge-cleanup
# zj-loop-template-version: 1
# zj-loop-template-hash: 92c2e50ae01a27f8

name: ZJ Loop Post-Merge Cleanup

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number with post-merge contract'
        required: false
        default: ''
      carrier_issue:
        description: 'Expected activation carrier issue'
        required: false
        default: ''
      live_cleanup_confirmation:
        description: 'Optional fallback phrase for live branch/issue cleanup'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json
        with:
          fetch-depth: 50

      - name: Post-merge cleanup route evidence
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CARRIER_ISSUE: ${{ inputs.carrier_issue }}
          LIVE_CLEANUP_CONFIRMATION: ${{ inputs.live_cleanup_confirmation }}
        run: |
          printf '## ZJ Loop Post-Merge Cleanup\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf 'Signal: merged Roadmap-Sliced PR closeout check.\n\n' >> "$GITHUB_STEP_SUMMARY"
          npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-route dispatch post-merge-roadmap-closeout --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-post-merge-closeout plan --json > consumer-plan.json || true
          if [ -n "$PR_NUMBER" ]; then
            args=(--pr "$PR_NUMBER" --repo "${{ github.repository }}")
            if [ -n "$CARRIER_ISSUE" ]; then
              args+=(--carrier-issue "$CARRIER_ISSUE")
            fi
            npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-post-merge-closeout closeout-plan "${args[@]}" --json > closeout-plan.json || true
            printf '### Closeout Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat closeout-plan.json >> "$GITHUB_STEP_SUMMARY"
            live_args=("${args[@]}")
            if [ -n "$LIVE_CLEANUP_CONFIRMATION" ]; then
              live_args+=(--require-live-confirmation --confirm-live-cleanup "$LIVE_CLEANUP_CONFIRMATION")
            fi
            if npx --yes --package @jununfly/zj-loop-core@0.1.17 zj-loop-post-merge-closeout live-closeout \
              "${live_args[@]}" \
              --json > live-closeout-result.json; then
              printf '\n\n### Live Closeout Result\n\n' >> "$GITHUB_STEP_SUMMARY"
              cat live-closeout-result.json >> "$GITHUB_STEP_SUMMARY"
            else
              printf '\n\nLive cleanup did not execute. A valid merged-PR contract can authorize cleanup automatically; otherwise provide the fixed confirmation phrase after reviewing the closeout plan.\n\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            printf 'No PR number was provided. This run records route and consumer evidence only.\n\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          printf '\n\n### Route Decision\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Consumer Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
