# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-pr-steward
# zj-loop-template-version: 1
# zj-loop-template-hash: d29f7f9f9d7d5df5

name: ZJ Loop PR Steward

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      issue_fix_request_json:
        description: 'Consumed PR Steward Issue Fix Request JSON'
        required: false
        default: ''
      current_pr_head_sha:
        description: 'Current source PR head SHA'
        required: false
        default: ''
      repair_command:
        description: 'Optional deterministic repair command for live PR Steward dogfood'
        required: false
        default: ''
      repair_files:
        description: 'Optional comma-separated repair files for live PR Steward dogfood'
        required: false
        default: ''
      confirm_live_repair:
        description: 'Optional fixed phrase for live PR Steward repair'
        required: false
        default: ''
      core_package:
        description: 'Core package spec; use ./tools/zj-loop-core for unreleased repo dogfood'
        required: false
        default: '@jununfly/zj-loop-core@0.1.15'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  steward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.15 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - name: Install local core package dependencies
        if: ${{ startsWith(inputs.core_package, './') }}
        run: npm install --prefix "${{ inputs.core_package }}"

      - name: PR steward route evidence
        env:
          ISSUE_FIX_REQUEST_JSON: ${{ inputs.issue_fix_request_json }}
          CURRENT_PR_HEAD_SHA: ${{ inputs.current_pr_head_sha }}
          REPAIR_COMMAND: ${{ inputs.repair_command }}
          REPAIR_FILES: ${{ inputs.repair_files }}
          CONFIRM_LIVE_REPAIR: ${{ inputs.confirm_live_repair }}
          ZJ_LOOP_CORE_PACKAGE: ${{ inputs.core_package || '@jununfly/zj-loop-core@0.1.15' }}
        run: |
          npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-route dispatch pr-steward-report --json > route-decision.json || true
          npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-consumer plan pr-steward-report --json > consumer-plan.json || true
          if [ -n "$ISSUE_FIX_REQUEST_JSON" ] && [ -n "$CURRENT_PR_HEAD_SHA" ]; then
            printf '%s\n' "$ISSUE_FIX_REQUEST_JSON" > issue-fix-request.json
            args=(--request issue-fix-request.json --current-pr-head-sha "$CURRENT_PR_HEAD_SHA")
            if [ -n "$REPAIR_COMMAND" ]; then
              args+=(--repair-command "$REPAIR_COMMAND")
            fi
            if [ -n "$REPAIR_FILES" ]; then
              args+=(--repair-files "$REPAIR_FILES")
            fi
            npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-pr-steward fix-plan \
              "${args[@]}" \
              --json > fix-plan.json || true
            [ -f fix-plan.json ] && cat fix-plan.json >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$CONFIRM_LIVE_REPAIR" ]; then
              npx --yes --package "$ZJ_LOOP_CORE_PACKAGE" zj-loop-pr-steward live-repair \
                "${args[@]}" \
                --confirm-live-repair "$CONFIRM_LIVE_REPAIR" \
                --out live-repair-result.json \
                --json || true
              printf '\n\n### Live Repair Result\n\n' >> "$GITHUB_STEP_SUMMARY"
              [ -f live-repair-result.json ] && cat live-repair-result.json >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          [ -f route-decision.json ] && cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          [ -f consumer-plan.json ] && cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR Steward evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-pr-steward-${{ github.run_id }}
          path: |
            route-decision.json
            consumer-plan.json
            issue-fix-request.json
            fix-plan.json
            live-repair-result.json
          if-no-files-found: ignore
