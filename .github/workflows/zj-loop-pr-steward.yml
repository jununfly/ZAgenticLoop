name: ZJ Loop PR Steward

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  steward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: PR steward route evidence
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.2 zj-loop-route dispatch pr-steward-report --json > route-decision.json || true
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
