# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-roadmap-activation
# zj-loop-template-version: 1
# zj-loop-template-hash: 4ecab95a0e06c245

name: ZJ Loop Roadmap Activation

on:
  workflow_dispatch:
    inputs:
      command_text:
        description: 'Slash command text'
        required: true
        default: '/zj-loop start roadmap-sliced-development'
      requested_by:
        description: 'Requester login'
        required: true
        default: 'maintainer'
      permission:
        description: 'Requester repository permission'
        required: true
        default: 'write'
      source_issue:
        description: 'Source issue number'
        required: true
      command_comment_id:
        description: 'Slash command comment id'
        required: true
        default: 'workflow-dispatch'
      activation_title:
        description: 'Short title for the Roadmap Activation PR contract'
        required: false
        default: ''
      comments_json:
        description: 'Existing issue comments JSON array'
        required: false
        default: '[]'
      leaf_slices_json:
        description: 'Roadmap leaf slices JSON array for bounded-slices pack mode'
        required: false
        default: '[]'
      max_slices:
        description: 'Maximum slices for bounded execution pack'
        required: false
        default: '30'

permissions:
  contents: read
  issues: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - name: Roadmap activation route evidence
        env:
          COMMAND_TEXT: ${{ inputs.command_text }}
          REQUESTED_BY: ${{ inputs.requested_by }}
          REQUEST_PERMISSION: ${{ inputs.permission }}
          SOURCE_ISSUE: ${{ inputs.source_issue }}
          COMMAND_COMMENT_ID: ${{ inputs.command_comment_id }}
          ACTIVATION_TITLE: ${{ inputs.activation_title }}
          COMMENTS_JSON: ${{ inputs.comments_json }}
          LEAF_SLICES_JSON: ${{ inputs.leaf_slices_json }}
          MAX_SLICES: ${{ inputs.max_slices }}
        run: |
          printf '## ZJ Loop Roadmap Activation\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf 'Signal: maintainer slash command for `roadmap-sliced-development`.\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$COMMENTS_JSON" > activation-comments.json
          printf '%s\n' "$LEAF_SLICES_JSON" > leaf-slices.json
          npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-route dispatch roadmap-sliced-development --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-roadmap-activation plan --json > consumer-plan.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-roadmap-activation activation-plan \
            --command-text "$COMMAND_TEXT" \
            --requested-by "$REQUESTED_BY" \
            --permission "$REQUEST_PERMISSION" \
            --source-issue "$SOURCE_ISSUE" \
            --command-comment-id "$COMMAND_COMMENT_ID" \
            --comments activation-comments.json \
            --comment-out activation-comment.md \
            --json > activation-plan.json || true
          ACTIVATION_REQUEST_ID="$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('activation-plan.json','utf8')); process.stdout.write(p.activationRequestId || '')")"
          if [ -n "$ACTIVATION_REQUEST_ID" ]; then
            SOURCE_ISSUE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/issues/${SOURCE_ISSUE}"
            SOURCE_COMMENT_URL="${SOURCE_ISSUE_URL}#issuecomment-${COMMAND_COMMENT_ID}"
            npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-roadmap-activation contract-plan \
              --activation-request-id "$ACTIVATION_REQUEST_ID" \
              --title "${ACTIVATION_TITLE:-issue-${SOURCE_ISSUE}}" \
              --source-issue "$SOURCE_ISSUE" \
              --source-issue-url "$SOURCE_ISSUE_URL" \
              --source-comment-url "$SOURCE_COMMENT_URL" \
              --process-roadmap-path "docs/plans/roadmap-activation-${SOURCE_ISSUE}.md" \
              --json > contract-plan.json || true
            BRANCH_NAME="$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('contract-plan.json','utf8')); process.stdout.write(p.branchName || '')")"
            npx --yes --package @jununfly/zj-loop-core@0.1.21 zj-loop-roadmap-activation bounded-slices-pack \
              --activation-request-id "$ACTIVATION_REQUEST_ID" \
              --roadmap-path "docs/plans/roadmap-activation-${SOURCE_ISSUE}.md" \
              --branch-name "$BRANCH_NAME" \
              --slices leaf-slices.json \
              --max-slices "$MAX_SLICES" \
              --json > bounded-slices-pack.json || true
            printf 'Created activation evidence and bounded roadmap execution pack.\n\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' '{"schema":"zj-loop.roadmap_activation_contract_plan.v1","status":"skipped","reason":"activation request was not created"}' > contract-plan.json
            printf '%s\n' '{"schema":"zj-loop.roadmap_bounded_slice_pack.v1","status":"skipped","reason":"activation request was not created"}' > bounded-slices-pack.json
            printf 'Activation request was not created. Inspect the plan evidence below for authorization, duplicate, route, or loop-prevention reasons.\n\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          printf '### Route Decision\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Consumer Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Activation Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat activation-plan.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Contract Plan\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat contract-plan.json >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n### Bounded Slice Pack\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat bounded-slices-pack.json >> "$GITHUB_STEP_SUMMARY"
