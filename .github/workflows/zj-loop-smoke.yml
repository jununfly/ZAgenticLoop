# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-smoke
# zj-loop-template-version: 1
# zj-loop-template-hash: b68b3ac4e98c40aa

name: ZJ Loop Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Smoke route decision
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.2 zj-loop-route dispatch manual-smoke-report --json > route-decision.json
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"

      - name: Audit installed loop readiness
        run: npx @jununfly/zj-loop-audit@0.1.3 . --suggest
