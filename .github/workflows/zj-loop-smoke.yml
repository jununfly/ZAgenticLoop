# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-smoke
# zj-loop-template-version: 1
# zj-loop-template-hash: 34f8495ae44e637a

name: ZJ Loop Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify ZJ Loop version consistency
        run: |
          if npx --yes --package @jununfly/zj-loop-core@0.1.11 zj-loop-version-consistency --root . --provider github --out version-consistency-result.json --json; then
            exit 0
          fi
          test -f tools/zj-loop-core/dist/version-consistency-cli.js
          node tools/zj-loop-core/dist/version-consistency-cli.js --root . --provider github --out version-consistency-result.json --json

      - name: Upload ZJ Loop version consistency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zj-loop-version-consistency
          path: version-consistency-result.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Smoke route decision
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.11 zj-loop-route dispatch manual-smoke-report --json > route-decision.json
          npx --yes --package @jununfly/zj-loop-core@0.1.11 zj-loop-consumer plan manual-smoke-report --json > consumer-plan.json
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"

      - name: Audit installed loop readiness
        run: npx @jununfly/zj-loop-audit@0.1.6 . --suggest
