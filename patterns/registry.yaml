# Machine-readable pattern registry for zagenticloop
# Used by zj-loop-audit, zj-loop-cost, docs site, and tooling.

schemaVersion: 1

patterns:
  - id: pr-babysitter
    name: PR Babysitter
    file: pr-babysitter.md
    goal: Shepherd PRs through review, CI, rebase, and merge
    cadence: 5m-15m
    risk: medium
    tools: [grok, claude-code, codex, github-actions]
    skills: [pr-review-triage, minimal-fix, rebase-and-clean]
    state: zj-loop/pr-babysitter-state.md
    phases: [discover, triage, fix, verify, notify]
    human_gates: [security, payments, auth, max-fix-attempts]
    starter: starters/pr-babysitter
    week_one_mode: L1
    token_cost: high
    cost:
      tokens_noop: 3000
      tokens_report: 80000
      tokens_action: 250000
      suggested_daily_cap: 2000000
      early_exit_required: true
    init:
      templates:
        minimal_fix: true
        verifier: false
      budget:
        max_runs_per_day: 288
        max_spawns_l1: 0
        max_spawns_l2: 3
      first_loop_command:
        grok: /loop 10m Run pr-review-triage. Update pr-babysitter-state.md. Worktree + minimal-fix + verifier for allowlisted PRs only. Escalate after 3 attempts.
        claude: /loop 10m $pr-review-triage — update pr-babysitter-state.md. No auto-merge.
        codex: "Automation 10m: pr-review-triage → pr-babysitter-state.md. No auto-merge."

  - id: daily-triage
    name: Daily Triage
    file: daily-triage.md
    goal: Prioritized morning scan of CI, issues, commits, and chat
    cadence: 1d-2h
    risk: low
    tools: [grok, claude-code, codex, github-actions]
    skills: [loop-triage, minimal-fix]
    state: zj-loop/STATE.md
    phases: [report, act-small-wins, escalate]
    human_gates: [design-decisions, multi-file-refactors]
    starter: starters/minimal-loop
    week_one_mode: L1
    token_cost: low
    cost:
      tokens_noop: 5000
      tokens_report: 50000
      tokens_action: 200000
      suggested_daily_cap: 100000
      early_exit_required: false
    init:
      tool_starters:
        grok: starters/minimal-loop
        claude: starters/minimal-loop-claude
        codex: starters/minimal-loop-codex
      templates:
        minimal_fix: false
        verifier: false
      budget:
        max_runs_per_day: 2
        max_spawns_l1: 0
        max_spawns_l2: 2
      first_loop_command:
        grok: /loop 1d Run loop-triage. Update zj-loop/STATE.md. No auto-fix in week one.
        claude: /loop 1d $loop-triage — update zj-loop/STATE.md. Report-only week one.
        codex: "Automation daily: $loop-triage → update zj-loop/STATE.md. Report-only."

  - id: ci-sweeper
    name: CI Sweeper
    file: ci-sweeper.md
    goal: React to failing CI with minimal fixes and escalation
    cadence: 5m-15m
    risk: medium
    tools: [grok, claude-code, codex, github-actions]
    skills: [ci-triage, minimal-fix]
    state: zj-loop/ci-sweeper-state.md
    phases: [detect, classify, fix, verify, escalate]
    human_gates: [infra-failures, max-attempts, security-tests]
    starter: starters/ci-sweeper
    week_one_mode: L2
    token_cost: very-high
    cost:
      tokens_noop: 5000
      tokens_report: 50000
      tokens_action: 200000
      suggested_daily_cap: 1000000
      early_exit_required: true
    init:
      templates:
        minimal_fix: true
        verifier: true
      budget:
        max_runs_per_day: 96
        max_spawns_l1: 0
        max_spawns_l2: 3
      first_loop_command:
        grok: /loop 15m Run ci-triage on failing CI. Update ci-sweeper-state.md. Fix only regressions in worktree. Max 3 attempts.
        claude: /loop 15m $ci-triage — update ci-sweeper-state.md. Max 3 fix attempts.
        codex: "Automation 15m: ci-triage on CI failures. Max 3 attempts."

  - id: post-merge-cleanup
    name: Post-Merge Cleanup
    file: post-merge-cleanup.md
    goal: Follow-up tech debt and cleanup after merges to main
    cadence: 1d-6h
    risk: low
    tools: [grok, claude-code, codex, github-actions]
    skills: [post-merge-scan, minimal-fix]
    state: zj-loop/post-merge-state.md
    phases: [scan-merges, prioritize, fix-small, ticket-large]
    human_gates: [architectural-debt, feature-flags, large-diffs]
    starter: starters/post-merge-cleanup
    week_one_mode: L1
    token_cost: low
    cost:
      tokens_noop: 5000
      tokens_report: 40000
      tokens_action: 150000
      suggested_daily_cap: 200000
      early_exit_required: false
    init:
      templates:
        minimal_fix: true
        verifier: false
      budget:
        max_runs_per_day: 1
        max_spawns_l1: 0
        max_spawns_l2: 2
      first_loop_command:
        grok: /loop 1d Run post-merge-scan on recent merges. Update post-merge-state.md. Small fixes only in worktree.
        claude: /loop 1d $post-merge-scan — update post-merge-state.md. Small fixes only.
        codex: "Automation daily: post-merge-scan → post-merge-state.md."

  - id: dependency-sweeper
    name: Dependency Sweeper
    file: dependency-sweeper.md
    goal: Discover, safely apply, and verify dependency + vulnerability updates with human gates on risky changes
    cadence: 6h-1d
    risk: medium
    tools: [grok, claude-code, codex, github-actions]
    skills: [dependency-triage, minimal-fix, loop-verifier]
    state: zj-loop/dependency-sweeper-state.md
    phases: [scan, triage-risk, patch-safe, verify-worktree, escalate-risky]
    human_gates: [major-bumps, high-sev-cve, denylisted-packages, max-attempts]
    starter: starters/dependency-sweeper
    week_one_mode: L2
    token_cost: medium
    cost:
      tokens_noop: 5000
      tokens_report: 60000
      tokens_action: 300000
      suggested_daily_cap: 500000
      early_exit_required: true
    init:
      templates:
        minimal_fix: true
        verifier: true
      budget:
        max_runs_per_day: 4
        max_spawns_l1: 0
        max_spawns_l2: 3
      first_loop_command:
        grok: /loop 6h Run dependency-triage. Patch-only auto-fix in worktree + verifier. Escalate majors and denylist.
        claude: /loop 6h $dependency-triage — patch-only with verifier. Escalate risky bumps.
        codex: "Automation 6h: dependency-triage. Patch-only with verifier."

  - id: changelog-drafter
    name: Changelog Drafter
    file: changelog-drafter.md
    goal: Scan merged PRs and commits, draft categorized high-quality release notes or CHANGELOG entries for human review
    cadence: 1d
    risk: low
    tools: [grok, claude-code, codex, github-actions]
    skills: [changelog-scan, draft-release-notes, loop-verifier]
    state: zj-loop/changelog-drafter-state.md
    phases: [scan-merges, categorize, draft, review, publish]
    human_gates: [breaking-changes, security, major-features, marketing-sensitive]
    starter: starters/changelog-drafter
    week_one_mode: L1
    token_cost: low
    cost:
      tokens_noop: 5000
      tokens_report: 35000
      tokens_action: 80000
      suggested_daily_cap: 100000
      early_exit_required: false
    init:
      templates:
        minimal_fix: false
        verifier: false
      budget:
        max_runs_per_day: 1
        max_spawns_l1: 0
        max_spawns_l2: 2
      first_loop_command:
        grok: /loop 1d Run changelog-scan on merges since last tag. Produce categorized draft in RELEASE_NOTES_DRAFT.md using draft-release-notes. Update changelog-drafter-state.md. Human review only.
        claude: /loop 1d $changelog-scan + draft-release-notes — write RELEASE_NOTES_DRAFT.md and update state. Human approves before publish.
        codex: "Automation daily: changelog-scan + draft-release-notes → RELEASE_NOTES_DRAFT.md. Human review."

  - id: issue-triage
    name: Issue Triage
    file: issue-triage.md
    goal: Discover, deduplicate, prioritize and label incoming issues/discussions so the team always has a clean actionable queue. Excellent low-risk companion to Daily Triage.
    cadence: 2h-1d
    risk: low
    tools: [grok, claude-code, codex, github-actions]
    skills: [issue-triage, loop-verifier]
    state: zj-loop/issue-triage-state.md
    phases: [discover, dedupe, score, propose-labels, human-review]
    human_gates: [security, p0-p1, ambiguous-duplicates, stale-closures]
    starter: starters/issue-triage
    week_one_mode: L1
    token_cost: low
    cost:
      tokens_noop: 3000
      tokens_report: 30000
      tokens_action: 60000
      suggested_daily_cap: 80000
      early_exit_required: false
    init:
      templates:
        minimal_fix: false
        verifier: false
      budget:
        max_runs_per_day: 12
        max_spawns_l1: 0
        max_spawns_l2: 1
      first_loop_command:
        grok: /loop 2h Run issue-triage. Update issue-triage-state.md. Propose labels and priority only. No auto-apply. Human reviews the needs-human slice.
        claude: /loop 2h $issue-triage — update issue-triage-state.md. Suggest labels on allowlisted areas only. Report mode week one.
        codex: "Automation 2h: issue-triage → issue-triage-state.md. Propose only."

  - id: roadmap-sliced-development
    name: Roadmap-Sliced Development Pattern
    file: roadmap-sliced-development.md
    goal: Drive ambiguous architecture, product, documentation, and release initiatives through bounded roadmap-backed slices
    cadence: 1d
    risk: medium
    tools: [grok, claude-code, codex]
    skills: [zj-grill-me, zj-roadmap-driven, zj-grill-with-docs]
    state: zj-loop/roadmap-sliced-state.md
    phases: [explore, decide, slice, verify, commit, closeout, pr-handoff]
    human_gates: [naming, scope-expansion, release-boundary, branch-merge, process-doc-deletion]
    starter: starters/roadmap-sliced-development
    week_one_mode: L2
    token_cost: medium
    cost:
      tokens_noop: 10000
      tokens_report: 80000
      tokens_action: 300000
      suggested_daily_cap: 500000
      early_exit_required: true
    init:
      templates:
        minimal_fix: false
        verifier: true
      budget:
        max_runs_per_day: 1
        max_spawns_l1: 0
        max_spawns_l2: 2
      first_loop_command:
        grok: /loop 1d Run roadmap-sliced-development. Update zj-loop/roadmap-sliced-state.md before commits. Execute one bounded slice, verify, commit, and stop at Human Gates.
        claude: /loop 1d $zj-grill-me + $zj-roadmap-driven — execute one roadmap slice with verification evidence before commit. Stop at Human Gates.
        codex: "Run $zj-grill-me + $zj-roadmap-driven for one bounded roadmap slice. Update zj-loop/roadmap-sliced-state.md before commit; continue to PR handoff after closeout."
