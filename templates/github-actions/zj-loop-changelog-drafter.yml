# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-changelog-drafter
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

name: ZJ Loop Changelog Drafter

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Changelog drafter route evidence
        run: |
          echo "consumer=changelog-drafter" >> "$GITHUB_STEP_SUMMARY"
          echo "route_table=zj-loop/zj-loop-route-table.yaml" >> "$GITHUB_STEP_SUMMARY"
          echo "side_effects=require_route_table_enablement" >> "$GITHUB_STEP_SUMMARY"
          echo "mode=draft_request_after_route_enablement" >> "$GITHUB_STEP_SUMMARY"
