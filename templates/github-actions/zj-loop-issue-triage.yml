# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-issue-triage
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

name: ZJ Loop Issue Triage

on:
  issues:
    types: [opened, reopened, labeled]
  schedule:
    - cron: '0 */2 * * 1-5'
  workflow_dispatch:
    inputs:
      triage_action_request_json:
        description: 'Issue Triage Action Request JSON'
        required: false
        default: ''
      triage_transition_request_json:
        description: 'Recommended Triage Transition JSON'
        required: false
        default: ''
      triage_transition_confirmation:
        description: 'Fixed confirmation phrase for confirmed triage transition'
        required: false
        default: ''

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Issue triage route evidence
        env:
          TRIAGE_ACTION_REQUEST_JSON: ${{ inputs.triage_action_request_json }}
          TRIAGE_TRANSITION_REQUEST_JSON: ${{ inputs.triage_transition_request_json }}
          TRIAGE_TRANSITION_CONFIRMATION: ${{ inputs.triage_transition_confirmation }}
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-route dispatch issue-backlog-triage --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-consumer plan issue-backlog-triage --json > consumer-plan.json || true
          if [ -n "$TRIAGE_ACTION_REQUEST_JSON" ]; then
            printf '%s\n' "$TRIAGE_ACTION_REQUEST_JSON" > triage-action-request.json
            npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-issue-triage-action action-plan \
              --request triage-action-request.json \
              --json > action-plan.json || true
            cat action-plan.json >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$TRIAGE_TRANSITION_REQUEST_JSON" ]; then
            printf '%s\n' "$TRIAGE_TRANSITION_REQUEST_JSON" > triage-transition-request.json
            npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-issue-triage-transition confirm-plan \
              --request triage-transition-request.json \
              --confirmation-phrase "$TRIAGE_TRANSITION_CONFIRMATION" \
              --json > transition-plan.json || true
            cat transition-plan.json >> "$GITHUB_STEP_SUMMARY"
          fi
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
