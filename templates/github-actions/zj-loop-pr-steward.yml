# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-pr-steward
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

name: ZJ Loop PR Steward

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      issue_fix_request_json:
        description: 'Consumed PR Steward Issue Fix Request JSON'
        required: false
        default: ''
      current_pr_head_sha:
        description: 'Current source PR head SHA'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  steward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: PR steward route evidence
        env:
          ISSUE_FIX_REQUEST_JSON: ${{ inputs.issue_fix_request_json }}
          CURRENT_PR_HEAD_SHA: ${{ inputs.current_pr_head_sha }}
        run: |
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-route dispatch pr-steward-report --json > route-decision.json || true
          npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-consumer plan pr-steward-report --json > consumer-plan.json || true
          if [ -n "$ISSUE_FIX_REQUEST_JSON" ] && [ -n "$CURRENT_PR_HEAD_SHA" ]; then
            printf '%s\n' "$ISSUE_FIX_REQUEST_JSON" > issue-fix-request.json
            npx --yes --package @jununfly/zj-loop-core@0.1.3 zj-loop-pr-steward fix-plan \
              --request issue-fix-request.json \
              --current-pr-head-sha "$CURRENT_PR_HEAD_SHA" \
              --json > fix-plan.json || true
            cat fix-plan.json >> "$GITHUB_STEP_SUMMARY"
          fi
          cat route-decision.json >> "$GITHUB_STEP_SUMMARY"
          cat consumer-plan.json >> "$GITHUB_STEP_SUMMARY"
