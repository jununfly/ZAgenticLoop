# zj-loop-generated: true
# zj-loop-template-id: github-actions/zj-loop-smoke
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

name: ZJ Loop Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Smoke route decision
        run: |
          echo "schema=zj-loop.route_decision.v1" >> "$GITHUB_STEP_SUMMARY"
          echo "route=manual-smoke-report" >> "$GITHUB_STEP_SUMMARY"
          echo "request_kind=report-only" >> "$GITHUB_STEP_SUMMARY"
          echo "target_consumer=none" >> "$GITHUB_STEP_SUMMARY"
          echo "side_effects=disabled" >> "$GITHUB_STEP_SUMMARY"
          echo "route_table=zj-loop/zj-loop-route-table.yaml" >> "$GITHUB_STEP_SUMMARY"

      - name: Audit installed loop readiness
        run: npx @jununfly/zj-loop-audit@0.1.3 . --suggest
