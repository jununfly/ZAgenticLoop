zj_loop_changelog_drafter:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  when: manual
  variables:
    ZJ_LOOP_SIGNAL_ID: ""
    ZJ_LOOP_CHANGELOG_DRAFT_REQUEST_JSON: ""
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-route dispatch changelog-drafter-report --source gitlab-release-window --signal-id "${ZJ_LOOP_SIGNAL_ID:-${CI_PIPELINE_ID:-manual}}" --json > route-decision.json || true
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-consumer plan changelog-drafter-report --root . --source gitlab-release-window --signal-id "${ZJ_LOOP_SIGNAL_ID:-${CI_PIPELINE_ID:-manual}}" --json > consumer-plan.json || true
    - if [ -n "$ZJ_LOOP_CHANGELOG_DRAFT_REQUEST_JSON" ]; then printf '%s\n' "$ZJ_LOOP_CHANGELOG_DRAFT_REQUEST_JSON" > changelog-draft-request.json; else printf '%s\n' '{}' > changelog-draft-request.json; fi
    - >-
      node -e "const fs = require('fs'); const request = JSON.parse(fs.readFileSync('changelog-draft-request.json', 'utf8')); const signal = { schema: 'zj-loop.signal.v1', signal_id: process.env.ZJ_LOOP_SIGNAL_ID || process.env.CI_PIPELINE_ID || 'manual', source: 'workflow_dispatch', provider: 'gitlab', subject: { kind: 'local_goal', id: request.dedupe_key || 'changelog-draft-request' }, intent: 'draft_changelog', payload: { changelog_draft_request: request, draft_mode: 'evidence' } }; fs.writeFileSync('changelog-signal.json', JSON.stringify(signal, null, 2) + '\n');"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-dispatch --signal changelog-signal.json --mode auto --format json > orchestration.json || true
    - if [ -f orchestration.json ]; then cp orchestration.json draft-plan.json; fi
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-changelog-drafter gitlab-draft-evidence --request changelog-draft-request.json --project "$CI_PROJECT_PATH" --draft-file "${ZJ_LOOP_CHANGELOG_DRAFT_FILE:-docs/release-notes-draft.md}" --out gitlab-changelog-draft-evidence.json --json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - changelog-draft-request.json
      - route-decision.json
      - consumer-plan.json
      - changelog-signal.json
      - orchestration.json
      - draft-plan.json
      - gitlab-changelog-draft-evidence.json

