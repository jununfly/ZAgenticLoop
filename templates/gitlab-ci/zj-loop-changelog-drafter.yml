# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-changelog-drafter
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_changelog_drafter:
  stage: zj-loop
  image: node:22
  when: manual
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch changelog-drafter-report --source gitlab-release-window --signal-id "${CI_PIPELINE_ID:-manual}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-consumer plan changelog-drafter-report --root . --source gitlab-release-window --signal-id "${CI_PIPELINE_ID:-manual}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
