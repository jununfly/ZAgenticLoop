# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-ci-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_ci_sweeper:
  stage: __ZJ_LOOP_GITLAB_STAGE__
  image: node:22
  when: manual
  variables:
    ZJ_LOOP_SOURCE_URL: "$CI_PIPELINE_URL"
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch ci-sweeper --source gitlab-pipeline --signal-id "${CI_PIPELINE_ID:-manual}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-ci-sweeper plan --root . --source gitlab-pipeline --signal-id "${CI_PIPELINE_ID:-manual}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
