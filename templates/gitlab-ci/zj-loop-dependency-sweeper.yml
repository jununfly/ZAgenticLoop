# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-dependency-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_dependency_sweeper:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  when: manual
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-route dispatch dependency-sweeper --source gitlab-dependency --signal-id "${CI_PIPELINE_ID:-manual}" --json > route-decision.json
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-dependency-sweeper plan --root . --source gitlab-dependency --signal-id "${CI_PIPELINE_ID:-manual}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
