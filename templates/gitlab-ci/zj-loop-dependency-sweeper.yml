    - test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_MR" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_ISSUE" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_REQUEST" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_CLAIM" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_BRANCH" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_TARGET" && test -n "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_CONFIRM"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-dependency-sweeper gitlab-closeout --project "$CI_PROJECT_PATH" --merge-request "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_MR" --issue-iid "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_ISSUE" --request-id "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_REQUEST" --claim-id "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_CLAIM" --branch "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_BRANCH" --target-branch "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_TARGET" --confirm "$ZJ_LOOP_DEPENDENCY_CLOSEOUT_CONFIRM" --api-url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" --out dependency-sweeper-closeout-result.json --json
