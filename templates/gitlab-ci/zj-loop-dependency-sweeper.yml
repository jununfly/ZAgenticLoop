    - test -n "$ZJ_LOOP_DEPENDENCY_REQUEST_JSON" && test -n "$ZJ_LOOP_DEPENDENCY_ACTIONS_JSON" && test -n "$ZJ_LOOP_DEPENDENCY_PROJECT" && test -n "$ZJ_LOOP_DEPENDENCY_BRANCH" && test -n "$ZJ_LOOP_DEPENDENCY_SOURCE_REF" && test -n "$ZJ_LOOP_DEPENDENCY_TARGET_BRANCH" && test -n "$ZJ_LOOP_DEPENDENCY_COMMIT_MESSAGE" && test -n "$ZJ_LOOP_DEPENDENCY_MR_TITLE" && test -n "$ZJ_LOOP_DEPENDENCY_MR_DESCRIPTION"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-dependency-sweeper gitlab-repair-mr --request "$ZJ_LOOP_DEPENDENCY_REQUEST_JSON" --actions "$ZJ_LOOP_DEPENDENCY_ACTIONS_JSON" --project "$ZJ_LOOP_DEPENDENCY_PROJECT" --branch "$ZJ_LOOP_DEPENDENCY_BRANCH" --source-ref "$ZJ_LOOP_DEPENDENCY_SOURCE_REF" --target-branch "$ZJ_LOOP_DEPENDENCY_TARGET_BRANCH" --commit-message "$ZJ_LOOP_DEPENDENCY_COMMIT_MESSAGE" --title "$ZJ_LOOP_DEPENDENCY_MR_TITLE" --description "$ZJ_LOOP_DEPENDENCY_MR_DESCRIPTION" --api-url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" --out gitlab-repair-mr-result.json --json
