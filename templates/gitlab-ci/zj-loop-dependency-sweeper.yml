zj_loop_dependency_sweeper_closeout:
  stage: __ZJ_LOOP_GITLAB_RECOVERY_STAGE__
  needs: []
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  when: manual
  allow_failure: false
  variables:
    ZJ_LOOP_DEPENDENCY_CLOSEOUT_MR: ""
    ZJ_LOOP_DEPENDENCY_CLOSEOUT_ISSUE: ""
    ZJ_LOOP_DEPENDENCY_CLOSEOUT_REQUEST: ""
    ZJ_LOOP_DEPENDENCY_CLOSEOUT_CLAIM: ""
