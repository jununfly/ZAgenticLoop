# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-dependency-sweeper
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_dependency_sweeper:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: manual
    - when: never
  variables:
    ZJ_LOOP_SIGNAL_ID: ""
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-route dispatch dependency-sweeper --source gitlab-dependency --signal-id "${ZJ_LOOP_SIGNAL_ID:-${CI_PIPELINE_ID:-manual}}" --json > route-decision.json
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-dependency-sweeper plan --root . --source gitlab-dependency --signal-id "${ZJ_LOOP_SIGNAL_ID:-${CI_PIPELINE_ID:-manual}}" --json > consumer-plan.json || true
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json

zj_loop_dependency_sweeper_gitlab_repair_mr:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  when: manual
  variables:
    ZJ_LOOP_DEPENDENCY_REQUEST_JSON: ""
    ZJ_LOOP_DEPENDENCY_ACTIONS_JSON: ""
    ZJ_LOOP_DEPENDENCY_PROJECT: ""
    ZJ_LOOP_DEPENDENCY_BRANCH: ""
    ZJ_LOOP_DEPENDENCY_SOURCE_REF: ""
    ZJ_LOOP_DEPENDENCY_TARGET_BRANCH: ""
    ZJ_LOOP_DEPENDENCY_COMMIT_MESSAGE: ""
    ZJ_LOOP_DEPENDENCY_MR_TITLE: ""
