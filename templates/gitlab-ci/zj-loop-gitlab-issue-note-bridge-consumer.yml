zj_loop_gitlab_issue_note_bridge_consumer:
  stage: __ZJ_LOOP_GITLAB_STAGE__
  needs: []
  tags:
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "api" && $ZJ_LOOP_BRIDGE_EVENT_ID != "" && $ZJ_LOOP_BRIDGE_DEDUPE_KEY != "" && $ZJ_LOOP_BRIDGE_PROJECT_PATH != "" && $ZJ_LOOP_BRIDGE_ISSUE_IID != "" && $ZJ_LOOP_BRIDGE_NOTE_ID != "" && $ZJ_LOOP_BRIDGE_TARGET_ROUTE != "" && $ZJ_LOOP_BRIDGE_ENVELOPE_REF != ""'
      when: on_success
    - when: never
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-route dispatch roadmap-sliced-development --source gitlab-issue-note --signal-id "$ZJ_LOOP_BRIDGE_EVENT_ID" --json > route-decision.json || true
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-roadmap-activation plan --root . --source gitlab-issue-note --signal-id "$ZJ_LOOP_BRIDGE_EVENT_ID" --json > consumer-plan.json || true
    - |
      set +e
      npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-gitlab-issue-note-bridge-consumer --root . --out bridge-consumer-result.json --json
      status=$?
      printf '%s\n' "consumer_exit_code=$status"
      exit "$status"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
      - bridge-consumer-result.json
