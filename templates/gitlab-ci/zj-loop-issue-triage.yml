# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-issue-triage
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_issue_triage:
  stage: zj-loop
  image: node:22
  when: manual
  variables:
    ZJ_LOOP_ISSUE_IID: ""
    ZJ_LOOP_TRIAGE_REQUEST_JSON: ""
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch issue-backlog-triage --source gitlab-issue --signal-id "${ZJ_LOOP_ISSUE_IID:-$CI_PIPELINE_ID}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-consumer plan issue-backlog-triage --source gitlab-issue --signal-id "${ZJ_LOOP_ISSUE_IID:-$CI_PIPELINE_ID}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
