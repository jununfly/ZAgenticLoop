# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-post-merge-cleanup
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_post_merge_cleanup:
  stage: zj-loop
  image: node:22
  when: manual
  variables:
    ZJ_LOOP_MERGE_REQUEST_IID: ""
    ZJ_LOOP_LIVE_CLEANUP_CONFIRMATION: ""
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch post-merge-roadmap-closeout --source gitlab-merge-request --signal-id "${ZJ_LOOP_MERGE_REQUEST_IID:-$CI_PIPELINE_ID}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-post-merge-closeout plan --root . --source gitlab-merge-request --signal-id "${ZJ_LOOP_MERGE_REQUEST_IID:-$CI_PIPELINE_ID}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
