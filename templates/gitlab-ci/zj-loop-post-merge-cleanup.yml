# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-post-merge-cleanup
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_post_merge_cleanup:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: manual
    - when: never
  variables:
    ZJ_LOOP_SIGNAL_ID: ""
    ZJ_LOOP_MERGE_REQUEST_IID: ""
    ZJ_LOOP_REVIEW_URL: ""
    ZJ_LOOP_SOURCE_BRANCH: ""
    ZJ_LOOP_TARGET_BRANCH: ""
    ZJ_LOOP_CARRIER_ISSUE: ""
    ZJ_LOOP_CONFIRM_LIVE_CLEANUP: ""
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - mr_iid="${CI_MERGE_REQUEST_IID:-}"
    - signal_id="$CI_PIPELINE_ID"
    - job_token_args=""
    - if [ -n "${CI_JOB_TOKEN:-}" ]; then job_token_args="--gitlab-job-token ${CI_JOB_TOKEN}"; fi
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-route dispatch post-merge-roadmap-closeout --source gitlab-merge-request --signal-id "$signal_id" --json > route-decision.json
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-post-merge-closeout plan --root . --source gitlab-merge-request --signal-id "$signal_id" --json > consumer-plan.json || true
    - npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-post-merge-closeout closeout-plan --provider gitlab --repo "$CI_PROJECT_PATH" --merge-request "${mr_iid:-0}" --review-url "${ZJ_LOOP_REVIEW_URL:-$CI_PROJECT_URL/-/merge_requests/${mr_iid:-0}}" --gitlab-api-url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" $job_token_args --carrier-issue "${ZJ_LOOP_CARRIER_ISSUE:-0}" --json > closeout-plan.json || true
    - |
      if [ -n "$mr_iid" ]; then
        confirm_args=""
        if [ -n "${ZJ_LOOP_CONFIRM_LIVE_CLEANUP:-}" ]; then confirm_args="--confirm-live-cleanup ${ZJ_LOOP_CONFIRM_LIVE_CLEANUP}"; fi
        npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-post-merge-closeout live-closeout --provider gitlab --repo "$CI_PROJECT_PATH" --merge-request "$mr_iid" --gitlab-api-url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" $job_token_args --carrier-issue "${ZJ_LOOP_CARRIER_ISSUE:-0}" $confirm_args --require-live-confirmation --json > live-closeout-result.json
      else
        printf '%s\n' '{"schema":"zj-loop.post-merge-closeout.v1","status":"skipped","reason":"merge-request-iid-required","side_effects_executed":false}' > live-closeout-result.json
      fi
    - cat route-decision.json
    - cat consumer-plan.json
    - cat closeout-plan.json
    - cat live-closeout-result.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
      - closeout-plan.json
      - live-closeout-result.json
