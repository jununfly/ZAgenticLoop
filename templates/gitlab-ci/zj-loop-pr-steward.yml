zj_loop_mr_steward:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: node:22
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch pr-steward-report --source gitlab-merge-request --signal-id "${CI_MERGE_REQUEST_IID:-$CI_PIPELINE_ID}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-consumer plan pr-steward-report --root . --source gitlab-merge-request --signal-id "${CI_MERGE_REQUEST_IID:-$CI_PIPELINE_ID}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
