# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-roadmap-activation
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_roadmap_activation:
  stage: zj-loop
  image: node:22
  when: manual
  variables:
    ZJ_LOOP_ISSUE_IID: ""
    ZJ_LOOP_COMMENT_ID: ""
    ZJ_LOOP_MAX_SLICES: "30"
  script:
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-route dispatch roadmap-sliced-development --source gitlab-issue-note --signal-id "${ZJ_LOOP_COMMENT_ID:-$CI_PIPELINE_ID}" --json > route-decision.json
    - npx --yes --package @jununfly/zj-loop-core@0.1.4 zj-loop-roadmap-activation plan --root . --source gitlab-issue-note --signal-id "${ZJ_LOOP_COMMENT_ID:-$CI_PIPELINE_ID}" --json > consumer-plan.json
    - cat route-decision.json
    - cat consumer-plan.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - route-decision.json
      - consumer-plan.json
