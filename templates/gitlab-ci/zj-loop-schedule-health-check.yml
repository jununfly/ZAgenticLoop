zj_loop_schedule_health_check:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  needs: []
  variables:
    ZJ_LOOP_SCHEDULE_HEALTH_CONFIG_JSON: ""
    ZJ_LOOP_SCHEDULE_HEALTH_PROJECT: ""
    ZJ_LOOP_SCHEDULE_HEALTH_ROUTE: ""
    ZJ_LOOP_SCHEDULE_HEALTH_ID: ""
    ZJ_LOOP_SCHEDULE_HEALTH_JOB: ""
    ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT: ""
    ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT_SCHEMA: ""
    ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT: ""
    ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_SCHEMA: ""
    ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2: ""
    ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2_SCHEMA: ""
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18. Configure --gitlab-image with a Node 18+ image.'); process.exit(1); }"
    - >-
      if [ -n "$ZJ_LOOP_SCHEDULE_HEALTH_CONFIG_JSON" ]; then node -e 'const fs = require("fs"); const config = JSON.parse(process.env.ZJ_LOOP_SCHEDULE_HEALTH_CONFIG_JSON); const names = ["ZJ_LOOP_SCHEDULE_HEALTH_PROJECT", "ZJ_LOOP_SCHEDULE_HEALTH_ROUTE", "ZJ_LOOP_SCHEDULE_HEALTH_ID", "ZJ_LOOP_SCHEDULE_HEALTH_JOB", "ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT", "ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT_SCHEMA", "ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT", "ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_SCHEMA", "ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2", "ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2_SCHEMA"]; const encode = (value) => Buffer.from(String(value)).toString("base64"); const lines = names.filter((name) => config[name] !== undefined && config[name] !== null).map((name) => `export ${name}=$(printf %s ${encode(config[name])} | base64 -d)`); fs.writeFileSync("schedule-health-config.env", lines.join("\\n") + "\\n");'; . ./schedule-health-config.env; fi
    - test -n "$ZJ_LOOP_SCHEDULE_HEALTH_PROJECT" && test -n "$ZJ_LOOP_SCHEDULE_HEALTH_ROUTE" && test -n "$ZJ_LOOP_SCHEDULE_HEALTH_ID" && test -n "$ZJ_LOOP_SCHEDULE_HEALTH_JOB" && test -n "$ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT" && test -n "$ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT_SCHEMA"
    - supporting_artifact_args=""; if [ -n "${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT:-}" ]; then test -n "${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_SCHEMA:-}"; supporting_artifact_args="--supporting-artifact ${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT} --supporting-artifact-schema ${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_SCHEMA}"; fi; if [ -n "${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2:-}" ]; then test -n "${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2_SCHEMA:-}"; supporting_artifact_args="$supporting_artifact_args --supporting-artifact-2 ${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2} --supporting-artifact-2-schema ${ZJ_LOOP_SCHEDULE_HEALTH_SUPPORTING_ARTIFACT_2_SCHEMA}"; fi; npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-doctor --root . --provider gitlab --schedule-health --project "$ZJ_LOOP_SCHEDULE_HEALTH_PROJECT" --route "$ZJ_LOOP_SCHEDULE_HEALTH_ROUTE" --schedule-id "$ZJ_LOOP_SCHEDULE_HEALTH_ID" --job "$ZJ_LOOP_SCHEDULE_HEALTH_JOB" --artifact "$ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT" --artifact-schema "$ZJ_LOOP_SCHEDULE_HEALTH_ARTIFACT_SCHEMA" $supporting_artifact_args --api-url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" > schedule-health-result.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - schedule-health-result.json
