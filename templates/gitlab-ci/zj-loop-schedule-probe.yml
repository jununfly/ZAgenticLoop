# zj-loop-generated: true
# zj-loop-template-id: gitlab-ci/zj-loop-schedule-probe
# zj-loop-template-version: 1
# zj-loop-template-hash: generated-by-zj-loop-init

zj_loop_schedule_probe:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  timeout: 45m
  variables:
    ZJ_LOOP_SCHEDULE_PROBE_DUE_IN_MINUTES: ""
    ZJ_LOOP_SCHEDULE_PROBE_CONFIRMATION: ""
  script:
    - node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 18) { console.error('ZJ Loop GitLab CI requires Node >=18.'); process.exit(1); }"
    - |
      set +e
      npx --yes --package __ZJ_LOOP_CORE_PACKAGE__ zj-loop-schedule-probe start --root . --project "$CI_PROJECT_PATH" --ref "$CI_COMMIT_REF_NAME" --timezone "${CI_TIMEZONE:-UTC}" --api-url "$CI_API_V4_URL" --due-in-minutes "$ZJ_LOOP_SCHEDULE_PROBE_DUE_IN_MINUTES" --confirmation "$ZJ_LOOP_SCHEDULE_PROBE_CONFIRMATION" > schedule-probe-result.json
      exit_code=$?
      set -e
      cat schedule-probe-result.json
      exit "$exit_code"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - schedule-probe-result.json
      - zj-loop/schedule-probes/*.json

zj_loop_schedule_probe_receipt:
  stage: __ZJ_LOOP_GITLAB_STAGE__
__ZJ_LOOP_GITLAB_TAGS__  image: __ZJ_LOOP_GITLAB_IMAGE__
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $ZJ_LOOP_SCHEDULE_PROBE_ID != ""'
  needs: []
  allow_failure: false
  timeout: 5m
  script:
    - |
      node -e "const fs = require('fs'); const receipt = { schema: 'zj-loop.gitlab_schedule_probe_receipt.v1', status: process.env.ZJ_LOOP_SCHEDULE_PROBE_ID ? 'completed' : 'blocked', reason: process.env.ZJ_LOOP_SCHEDULE_PROBE_ID ? undefined : 'schedule-probe-capability-blocked', probe_id: process.env.ZJ_LOOP_SCHEDULE_PROBE_ID || null, pipeline_id: process.env.CI_PIPELINE_ID, project: process.env.CI_PROJECT_PATH, ref: process.env.CI_COMMIT_REF_NAME, source: process.env.CI_PIPELINE_SOURCE, next_steps: process.env.ZJ_LOOP_SCHEDULE_PROBE_ID ? [] : [{ command: 'zj-loop-schedule-probe start', purpose: 'create an owned schedule probe before claiming scheduled capability' }] }; fs.writeFileSync('schedule-probe-receipt.json', JSON.stringify(receipt, null, 2)); if (receipt.status === 'blocked') process.exit(0); if (!receipt.pipeline_id || !receipt.project || !receipt.ref || receipt.source !== 'schedule') process.exit(1);"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - schedule-probe-receipt.json
