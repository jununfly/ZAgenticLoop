schemaVersion: 1
score:
  base: 10
  contributions:
    - id: stateFile
      when: stateFile.present
      points: 18
    - id: triage
      when: triage.present
      points: 14
    - id: loopConfig
      when: loopConfig.present
      points: 9
    - id: agentsMd
      when: agentsMd.present
      points: 9
    - id: skillsTwoPlus
      when:
        path: skills.count
        gte: 2
      points: 14
    - id: skillsOne
      when:
        path: skills.count
        eq: 1
      points: 7
    - id: verifier
      when: verifier.present
      points: 14
    - id: safetyLoopMd
      when: safety.loopMdMentionsSafety
      points: 4
    - id: safetyDoc
      when: safety.safetyDocPresent
      points: 4
    - id: github
      when: github.present
      points: 6
    - id: githubWorkflows
      when: github.workflows
      points: 4
    - id: mcp
      when: mcp.present
      points: 3
    - id: worktree
      when: worktreeEvidence.present
      points: 3
    - id: registry
      when: registry.present
      points: 2
    - id: budgetDoc
      when: cost.budgetDoc
      points: 3
    - id: runLog
      when: cost.runLog
      points: 3
    - id: loopMdBudget
      when: cost.loopMdBudget
      points: 2
    - id: budgetSkill
      when: cost.budgetSkill
      points: 2
    - id: constraintsFile
      when: constraints.present
      points: 4
    - id: constraintsSkill
      when: constraints.hasConstraintsSkill
      points: 2
    - id: loopActivity
      when: loopActivity.present
      points: 6
predicates:
  costReady:
    all:
      - cost.budgetDoc
      - cost.runLog
      - cost.loopMdBudget
  hasRealActivity: loopActivity.present
  l3Ready:
    all:
      - predicate: costReady
      - predicate: hasRealActivity
levels:
  - level: L3
    threshold: 78
    when:
      all:
        - verifier.present
        - stateFile.present
        - predicate: l3Ready
  - level: L2
    threshold: 58
    when: triage.present
  - level: L1
    threshold: 38
    when: stateFile.present
  - level: L0
    threshold: 0
assessments:
  - when:
      all:
        - scoreGte: 82
        - predicate: l3Ready
    message: Strong loop readiness — good candidate for L3 with explicit gates.
  - when:
      all:
        - scoreGte: 82
        - not:
            predicate: costReady
    message: Strong signals but missing cost observability (zj-loop/zj-loop-budget.md, zj-loop/zj-loop-run-log.md, zj-loop/ZJ-LOOP.md budget) — add before L3.
  - when:
      all:
        - scoreGte: 82
        - not:
            predicate: hasRealActivity
    message: Strong structure but no proven loop runs yet — run one L1 cycle and commit state before L3.
  - when:
      scoreGte: 62
    message: Good foundation — add missing verifier + safety docs for L3.
  - when:
      scoreGte: 42
    message: Early loop setup — focus on L1 state + triage before enabling actions.
  - message: Not loop-ready — start with a starter from this repo (minimal-loop or pr-steward).
guidance:
  - when:
      not: stateFile.present
    finding:
      level: fail
      category: blocker
      message: No state file (zj-loop/STATE.md or zj-loop/<pattern>-state.md).
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold a baseline state file.
          command: mkdir -p zj-loop && cp starters/minimal-loop/STATE.md.example zj-loop/STATE.md
    recommendations:
      - Copy starters/minimal-loop/STATE.md.example (or -claude / -codex variant) to zj-loop/STATE.md
  - when: stateFile.present
    finding:
      level: ok
      category: pass
      message: "State file(s): {stateFile.paths}"
      affectsScore: false
      nextSteps: []
  - when:
      not: triage.present
    finding:
      level: warn
      category: readiness-gap
      message: No triage skill detected.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Initialize a daily-triage loop skill for a target tool.
          command: npx @jununfly/zj-loop-init . --pattern daily-triage --tool grok
    recommendations:
      - Install zj-loop-triage from starters/minimal-loop, minimal-loop-claude, or minimal-loop-codex
  - when: triage.present
    finding:
      level: ok
      category: pass
      message: Triage skill present.
      affectsScore: false
      nextSteps: []
  - when:
      not: verifier.present
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop-verifier skill — maker/checker split incomplete.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Add verifier skill for the target tool.
          command: mkdir -p .grok/skills/zj-loop-verifier && cp templates/SKILL.md.zj-loop-verifier .grok/skills/zj-loop-verifier/SKILL.md
    recommendations:
      - "Add verifier: .grok/skills/zj-loop-verifier, .claude/agents/zj-loop-verifier.md, or .codex/agents/verifier.toml"
  - when: verifier.present
    finding:
      level: ok
      category: pass
      message: Verifier skill present.
      affectsScore: false
      nextSteps: []
  - when:
      not: loopConfig.present
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop/ZJ-LOOP.md documenting cadence, limits, and gates.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold the loop operating contract.
          command: mkdir -p zj-loop && cp starters/minimal-loop/ZJ-LOOP.md zj-loop/ZJ-LOOP.md
    recommendations:
      - Copy starters/minimal-loop/ZJ-LOOP.md to zj-loop/ZJ-LOOP.md and customize
  - when:
      not: agentsMd.present
    finding:
      level: warn
      category: readiness-gap
      message: No AGENTS.md / CLAUDE.md for project conventions.
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Add AGENTS.md with build/test commands and review norms.
    recommendations:
      - Add AGENTS.md with build/test commands and review norms
  - when:
      not: safety.loopMdMentionsSafety
    finding:
      level: warn
      category: hardening
      message: zj-loop/ZJ-LOOP.md does not mention safety gates or auto-merge policy.
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Document human gates and auto-merge policy in zj-loop/ZJ-LOOP.md.
    recommendations:
      - Document human gates per zj-loop/zj-loop-safety.md in zj-loop/ZJ-LOOP.md
  - when:
      not: safety.safetyDocPresent
    finding:
      level: warn
      category: hardening
      message: No zj-loop/zj-loop-safety.md found.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold the canonical loop safety policy.
          command: npx @jununfly/zj-loop-init . --add safety
    recommendations:
      - Copy or create zj-loop/zj-loop-safety.md (denylists, auto-merge policy, MCP scopes)
  - when: safety.safetyDocPresent
    finding:
      level: ok
      category: pass
      message: Safety documentation present.
      affectsScore: false
      nextSteps: []
  - when:
      not: constraints.present
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop/zj-loop-constraints.md — structured constraints file missing.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold structured loop constraints.
          command: mkdir -p zj-loop && cp templates/zj-loop-constraints.md zj-loop/zj-loop-constraints.md
    recommendations:
      - Create zj-loop/zj-loop-constraints.md with denylist paths, push/merge rules, and human gates (see templates/zj-loop-constraints.md)
  - when: constraints.present
    finding:
      level: ok
      category: pass
      message: zj-loop/zj-loop-constraints.md present.
      affectsScore: false
      nextSteps: []
  - when:
      all:
        - constraints.present
        - not: constraints.hasConstraintsSkill
    finding:
      level: warn
      category: readiness-gap
      message: zj-loop/zj-loop-constraints.md exists but no zj-loop-constraints skill — rules not enforced at runtime.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Add the constraints runtime skill.
          command: npx @jununfly/zj-loop-init . --pattern daily-triage --tool grok
    recommendations:
      - Add zj-loop-constraints skill via zj-loop-init or templates/SKILL.md.zj-loop-constraints
  - when:
      not: github.present
    finding:
      level: warn
      category: hardening
      message: No .github/ directory (templates, workflows for dogfooding).
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Add GitHub issue/PR templates and workflows when the repo needs CI dogfooding.
    recommendations:
      - Add .github/ISSUE_TEMPLATE, PULL_REQUEST_TEMPLATE, and workflows (see this repo for examples)
  - when:
      all:
        - github.present
        - not: github.workflows
    finding:
      level: warn
      category: hardening
      message: .github/ exists but no workflows/ (CI dogfood opportunity).
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Add GitHub Actions that run zj-loop-audit and pattern validation.
    recommendations:
      - Add GitHub Actions that run zj-loop-audit and validate patterns (dogfood the reference)
  - when: github.workflows
    finding:
      level: ok
      category: pass
      message: .github/ with workflows present (strong dogfooding signal).
      affectsScore: false
      nextSteps: []
  - when:
      not: mcp.present
    finding:
      level: warn
      category: future-tooling
      message: No MCP / connector config or mentions detected.
      affectsScore: false
      nextSteps:
        - kind: info
          label: Document MCP usage only when this project needs connector-based automation.
    recommendations:
      - Document MCP usage (or note "MCP not required for this pattern") in zj-loop/ZJ-LOOP.md or skills
  - when:
      not: worktreeEvidence.present
    finding:
      level: warn
      category: hardening
      message: Little evidence of worktree usage in docs or state.
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Add worktree isolation notes to ZJ-LOOP.md or pattern docs.
    recommendations:
      - Add worktree isolation notes to ZJ-LOOP.md or pattern docs (see primitives and starters)
  - when:
      not: registry.present
    finding:
      level: warn
      category: future-tooling
      message: No patterns/registry.yaml (machine-readable index for future tools).
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold a pattern registry when publishing reusable patterns.
          command: npx @jununfly/zj-loop-init . --add pattern-registry
    recommendations:
      - Add patterns/registry.yaml following the existing format
  - when:
      not: cost.budgetDoc
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop/zj-loop-budget.md — token caps and kill switch undocumented.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold a loop budget file.
          command: mkdir -p zj-loop && cp templates/zj-loop-budget.md.template zj-loop/zj-loop-budget.md
    recommendations:
      - Scaffold with zj-loop-init or copy templates/zj-loop-budget.md.template
  - when: cost.budgetDoc
    finding:
      level: ok
      category: pass
      message: zj-loop/zj-loop-budget.md present.
      affectsScore: false
      nextSteps: []
  - when:
      not: cost.runLog
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop/zj-loop-run-log.md — run history not persisted.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Scaffold a loop run log.
          command: mkdir -p zj-loop && cp templates/zj-loop-run-log.md.template zj-loop/zj-loop-run-log.md
    recommendations:
      - Copy templates/zj-loop-run-log.md.template to zj-loop/zj-loop-run-log.md
  - when: cost.runLog
    finding:
      level: ok
      category: pass
      message: zj-loop/zj-loop-run-log.md present.
      affectsScore: false
      nextSteps: []
  - when:
      not: cost.loopMdBudget
    finding:
      level: warn
      category: readiness-gap
      message: zj-loop/ZJ-LOOP.md does not mention budget, token caps, or kill switch.
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Add a Budget section to zj-loop/ZJ-LOOP.md.
    recommendations:
      - Add a Budget section to zj-loop/ZJ-LOOP.md (see starters/*/ZJ-LOOP.md)
  - when:
      not: cost.budgetSkill
    finding:
      level: warn
      category: readiness-gap
      message: No zj-loop-budget skill — budget checks are not automated at runtime.
      affectsScore: true
      nextSteps:
        - kind: command
          label: Add the budget runtime skill.
          command: npx @jununfly/zj-loop-init . --pattern daily-triage --tool grok
    recommendations:
      - Add zj-loop-budget skill via zj-loop-init or templates/SKILL.md.zj-loop-budget
  - when: cost.budgetSkill
    finding:
      level: ok
      category: pass
      message: zj-loop-budget skill present.
      affectsScore: false
      nextSteps: []
  - when:
      not: loopActivity.present
    finding:
      level: warn
      category: readiness-gap
      message: No evidence of actual loop runs detected (no "Last run" entries in state, loop-related git activity, or scheduled workflows yet).
      affectsScore: true
      nextSteps:
        - kind: manual-review
          label: Run one report-only loop, update state, and commit the state/run-log evidence.
    recommendations:
      - Run one loop (report-only), update + commit zj-loop/STATE.md (or pattern state). This turns structure into proven usage.
  - when: loopActivity.present
    finding:
      level: ok
      category: pass
      message: Loop activity detected — real usage signals present ({loopActivity.evidence.length} sources).
      affectsScore: false
      nextSteps: []
  - when:
      all:
        - scoreGte: 78
        - verifier.present
        - stateFile.present
        - not:
            predicate: costReady
    finding:
      level: warn
      category: readiness-gap
      message: Score qualifies for L3 but cost observability is incomplete — capped at L2 until budget + run log + zj-loop/ZJ-LOOP.md budget exist.
      affectsScore: false
      nextSteps:
        - kind: info
          label: This finding explains the L3 gate cap; resolve the cost observability findings above.
  - when:
      all:
        - scoreGte: 78
        - verifier.present
        - stateFile.present
        - predicate: costReady
        - not: loopActivity.present
    finding:
      level: warn
      category: readiness-gap
      message: Score qualifies for L3 but no proven loop activity yet — capped at L2 until you run and commit at least one loop cycle.
      affectsScore: false
      nextSteps:
        - kind: info
          label: This finding explains the L3 gate cap; resolve the loop activity finding above.
