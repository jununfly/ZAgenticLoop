schemaVersion: 1
kind: zj-loop-route-table

metadata:
  primary_pattern: "daily-triage"
  primary_pattern_name: "Daily Triage"
  generated_by: "zj-loop-init"
  dogfood: true

policy:
  description: "Routing policy for ZAgenticLoop dogfood signals. This file is not a runtime queue."
  lifecycle_evidence:
    - "zj-loop/STATE.md"
    - "zj-loop/zj-loop-run-log.md"
    - "zj-loop/ci-sweeper-state.md"
    - "GitHub Actions workflow runs"
    - "GitHub pull requests"
    - "GitHub issues"
  default_enablement:
    human: true
    ignore: true
    selected_pattern_report_only: true
    cross_component_dispatch: true
    side_effect_routes: true

routes:
  - route_id: "human"
    enabled: true
    request_kind: "report-only"
    consumer: "maintainer"
    consumer_kind: "human-gate"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["human-decision"]
    maturity:
      protocol: "dogfooded"
      runner: "missing"
    capabilities:
      scopes: ["high-risk-review", "unknown-risk-review"]
      verifiers: ["human-review"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/STATE.md"
    match:
      risk: ["high", "unknown"]
    guards:
      requires_human_review: true
    dedupe_window: "24h"
    failure_owner: "maintainer"
    human_gate: "always"

  - route_id: "ignore"
    enabled: true
    request_kind: "report-only"
    consumer: "daily-triage"
    consumer_kind: "producer-router"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["report-evidence"]
    maturity:
      protocol: "dogfooded"
      runner: "missing"
    capabilities:
      scopes: ["noise-suppression", "route-decision"]
      verifiers: ["route-decision-evidence"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/STATE.md"
    match:
      route: ["ignore"]
    guards:
      requires_noise_reason: true
    dedupe_window: "24h"
    failure_owner: "daily-triage"
    human_gate: "none"

  - route_id: "daily-triage-report"
    enabled: true
    request_kind: "report-only"
    consumer: "daily-triage"
    consumer_kind: "producer-router"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["report-evidence"]
    maturity:
      protocol: "dogfooded"
      runner: "missing"
    capabilities:
      scopes: ["daily-triage", "route-decision", "state-report"]
      verifiers: ["route-decision-evidence", "state-update"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/STATE.md"
    match:
      route: ["daily-triage"]
    guards:
      side_effects_allowed: false
    dedupe_window: "24h"
    failure_owner: "daily-triage"
    human_gate: "on ambiguity or high risk"

  - route_id: "manual-smoke-report"
    enabled: true
    request_kind: "report-only"
    consumer: "manual-smoke"
    consumer_kind: "report-consumer"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["report-evidence"]
    maturity:
      protocol: "dogfooded"
      runner: "missing"
    capabilities:
      scopes: ["manual-smoke", "generated-workflow"]
      verifiers: ["workflow-summary"]
      max_side_effect_level: "evidence"
    evidence_store: "GitHub Actions workflow summary"
    match:
      source: ["workflow-dispatch"]
      route: ["manual-smoke-report"]
    guards:
      side_effects_allowed: false
    dedupe_window: "workflow_run"
    failure_owner: "maintainer"
    human_gate: "none"

  - route_id: "issue-triage-report"
    enabled: true
    request_kind: "report-only"
    consumer: "issue-triage"
    consumer_kind: "report-consumer"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["report-evidence"]
    maturity:
      protocol: "replayed"
      runner: "missing"
    capabilities:
      scopes: ["issue-backlog", "discussion-backlog", "triage-observation"]
      verifiers: ["route-replay", "forbidden-side-effect-check"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/issue-triage-state.md"
    match:
      source: ["issue", "discussion"]
      signal_kind:
        - "missing-info-observation"
        - "possible-duplicate-observation"
        - "label-suggestion-observation"
        - "human-attention-candidate"
        - "issue-backlog-summary"
    guards:
      side_effects_allowed: false
      public_issue_comment_allowed: false
      label_mutation_allowed: false
      close_reopen_allowed: false
      assignment_allowed: false
      milestone_allowed: false
      formal_issue_lifecycle_transition_allowed: false
      batch_mutation_allowed: false
      fixed_status_enum:
        - "recorded"
        - "already-recorded"
        - "rejected"
        - "routed-to-human-review"
    dedupe_window: "issue-triage:<repo>:<scan_window>:<signal_kind>:<subject>"
    failure_owner: "issue-triage"
    human_gate: "only for high/unknown risk, security/privacy, auth/billing/legal, destructive action, lifecycle transition, public comment, or label mutation"

  - route_id: "pr-steward-report"
    enabled: true
    request_kind: "report-only"
    consumer: "pr-steward"
    consumer_kind: "report-consumer"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["report-evidence"]
    maturity:
      protocol: "replayed"
      runner: "missing"
    capabilities:
      scopes: ["pull-request", "status-observation"]
      verifiers: ["route-replay", "forbidden-side-effect-check"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/pr-steward-state.md"
    match:
      source: ["pull_request"]
      action: ["opened", "synchronize", "review_requested", "ready_for_review"]
    guards:
      side_effects_allowed: false
      pr_comment_allowed: false
      label_changes_allowed: false
      rebase_allowed: false
      merge_allowed: false
    dedupe_window: "pr_number:action"
    failure_owner: "pr-steward"
    human_gate: "before comments, labels, rebase, merge, or fix request creation"

  - route_id: "pr-steward-fix-request"
    enabled: true
    request_kind: "issue-fix-request"
    consumer: "pr-steward"
    consumer_kind: "fix-runner"
    execution:
      mode: "claim-only"
      side_effect_level: "claim"
      completion_forms: ["repair-pr", "escalation-issue"]
    maturity:
      protocol: "replayed"
      runner: "missing"
    capabilities:
      scopes: ["pull-request", "failed-check-rollup"]
      verifiers: ["status-check-rollup", "request-claim", "current-pr-head-sha"]
      max_side_effect_level: "claim"
    evidence_store: "GitHub issues"
    match:
      source: ["pull_request"]
      action: ["synchronize", "ready_for_review"]
      checks: ["failure"]
      check_source: ["github_status_check_rollup"]
      draft: [false]
      base_branch: ["main"]
    guards:
      independent_issue_carrier: true
      pr_comment_allowed: false
      label_changes_allowed: false
      rebase_allowed: false
      merge_allowed: false
      workflow_dispatch_allowed: false
      verifier_required: true
      claim_only: true
      source_pr_comment_allowed_during_claim: false
      label_changes_allowed_during_claim: false
      rebase_allowed_during_claim: false
      merge_allowed_during_claim: false
      workflow_dispatch_allowed_during_claim: false
      repair_allowed_during_claim: false
      branch_creation_allowed_during_claim: false
      fix_pr_creation_allowed_during_claim: false
      fix_consumer_allowlist: ["pr-steward"]
    dedupe_window: "pr:repo:pr_number:head_sha:checks"
    failure_owner: "pr-steward"
    human_gate: "before source PR comments, labels, rebase, merge, workflow dispatch, repair, branch creation, or Fix PR creation"

  - route_id: "ci-sweeper"
    enabled: true
    request_kind: "issue-fix-request"
    consumer: "ci-sweeper"
    consumer_kind: "fix-runner"
    execution:
      mode: "live"
      side_effect_level: "pr"
      completion_forms: ["repair-pr", "escalation-issue"]
      recent_success_evidence:
        - "https://github.com/jununfly/ZAgenticLoop/actions/runs/28790735629"
        - "https://github.com/jununfly/ZAgenticLoop/issues/18"
    maturity:
      protocol: "dogfooded"
      runner: "dogfooded"
    capabilities:
      scopes: ["ci", "validate-patterns", "audit", "generated-workflow"]
      verifiers: ["ci-validate-gates", "ci-audit-gates", "diff-check"]
      max_side_effect_level: "pr"
    evidence_store: "zj-loop/ci-sweeper-state.md"
    match:
      source: ["ci"]
      workflows: ["validate-patterns", "audit"]
      conclusion: ["failure"]
    guards:
      branch_allowlist: ["main"]
      deterministic_repair_only: true
      create_pr_only: true
      auto_merge: false
      fix_consumer_allowlist: ["ci-sweeper", "pr-steward", "dependency-sweeper"]
    dedupe_window: "source_run_id"
    failure_owner: "ci-sweeper"
    human_gate: "when deterministic repair creates no diff or gates still fail"

  - route_id: "dependency-sweeper"
    enabled: true
    request_kind: "issue-fix-request"
    consumer: "dependency-sweeper"
    consumer_kind: "fix-runner"
    execution:
      mode: "claim-only"
      side_effect_level: "claim"
      completion_forms: ["repair-pr", "escalation-issue"]
    maturity:
      protocol: "replayed"
      runner: "replayed"
    capabilities:
      scopes: ["dependency", "patch-update", "minor-update"]
      verifiers: ["request-claim", "package-risk-check", "verification-gate"]
      max_side_effect_level: "claim"
    evidence_store: "zj-loop/dependency-sweeper-state.md"
    match:
      source: ["dependency"]
      update_type: ["patch", "minor"]
      risk: ["low", "medium"]
    guards:
      branch_allowlist: ["main"]
      direct_dependency_only: true
      verifier_required: true
      claim_only: true
      package_manifest_edit_allowed_during_claim: false
      lockfile_edit_allowed_during_claim: false
      branch_creation_allowed_during_claim: false
      pull_request_creation_allowed_during_claim: false
      workflow_dispatch_allowed_during_claim: false
      repair_allowed_during_claim: false
      auto_merge: false
      fix_consumer_allowlist: ["dependency-sweeper"]
    dedupe_window: "package:update_type:target_version"
    failure_owner: "dependency-sweeper"
    human_gate: "major, high risk, critical CVE, denylisted package, or verifier failure"

  - route_id: "changelog-drafter-report"
    enabled: true
    request_kind: "report-only"
    consumer: "changelog-drafter"
    consumer_kind: "draft-consumer"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["draft-evidence"]
    maturity:
      protocol: "replayed"
      runner: "missing"
    capabilities:
      scopes: ["release-prep", "merged-pr-batch", "changelog-observation"]
      verifiers: ["route-replay", "human-review-boundary"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/changelog-drafter-state.md"
    match:
      source: ["pull_request", "human"]
      action: ["merged", "merged_batch", "release_prep"]
      base_branch: ["main"]
    guards:
      side_effects_allowed: false
      release_notes_draft_allowed: false
      changelog_edit_allowed: false
      changelog_pr_allowed: false
      tag_allowed: false
      release_allowed: false
      package_publish_allowed: false
      workflow_dispatch_allowed: false
      human_review_required_on: ["breaking_change", "security", "major_version", "scan_window_too_large"]
    dedupe_window: "changelog:repo:base_branch:since_ref:until_ref"
    failure_owner: "changelog-drafter"
    human_gate: "breaking change, security note, major version, or scan window above 50 items"

  - route_id: "changelog-drafter-draft-request"
    enabled: true
    request_kind: "report-only"
    consumer: "changelog-drafter"
    consumer_kind: "draft-consumer"
    execution:
      mode: "report-only"
      side_effect_level: "evidence"
      completion_forms: ["draft-pr", "draft-evidence", "escalation-issue"]
    maturity:
      protocol: "replayed"
      runner: "missing"
    capabilities:
      scopes: ["release-prep", "draft-request"]
      verifiers: ["existing-changelog-report", "dedupe-check"]
      max_side_effect_level: "evidence"
    evidence_store: "zj-loop/changelog-drafter-state.md"
    match:
      source: ["changelog-drafter-report"]
      action: ["draft_request_candidate"]
    guards:
      side_effects_allowed: false
      requires_existing_changelog_report: true
      draft_consumer_start_allowed: false
      release_notes_draft_allowed: false
      changelog_edit_allowed: false
      changelog_pr_allowed: false
      tag_allowed: false
      release_allowed: false
      package_publish_allowed: false
      workflow_dispatch_allowed: false
    dedupe_window: "draft-request:changelog:repo:base_branch:since_ref:until_ref"
    failure_owner: "changelog-drafter"
    human_gate: "breaking change, security note, major version, or scan window above 50 items before draft request"

  - route_id: "roadmap-sliced-development"
    enabled: true
    request_kind: "activation-comment"
    consumer: "roadmap-sliced-development"
    consumer_kind: "activation-consumer"
    execution:
      mode: "live"
      side_effect_level: "branch"
      completion_forms:
        - "roadmap-branch-pr"
        - "activation-failed"
        - "activation-resumable"
      recent_success_evidence:
        - "https://github.com/jununfly/ZAgenticLoop/issues/19#issuecomment-4893007904"
        - "https://github.com/jununfly/ZAgenticLoop/issues/21#issuecomment-4893302147"
    maturity:
      protocol: "dogfooded"
      runner: "dogfooded"
    capabilities:
      scopes: ["roadmap-activation", "roadmap-bootstrap", "branch-bootstrap"]
      verifiers: ["activation-comment", "resume-anchors", "roadmap-gates"]
      max_side_effect_level: "branch"
    evidence_store: "append-only GitHub issue comments"
    match:
      source: ["issue", "daily-triage", "human"]
      command: ["/zj-loop start roadmap-sliced-development"]
    guards:
      allowed_permissions: ["admin", "maintain", "write"]
      consumer_allowed: true
      create_roadmap_artifacts: false
      append_only_comments: true
    dedupe_window: "active-pending-request"
    failure_owner: "roadmap-sliced-development"
    human_gate: "maintainer/collaborator command required"

  - route_id: "post-merge-roadmap-closeout"
    enabled: true
    request_kind: "report-only"
    consumer: "post-merge-cleanup"
    mode: "roadmap-closeout"
    consumer_kind: "cleanup-consumer"
    execution:
      mode: "dry-run"
      side_effect_level: "issue-comment"
      completion_forms:
        - "cleanup-done"
        - "cleanup-skipped"
        - "escalation-issue"
    maturity:
      protocol: "replayed"
      runner: "replayed"
    capabilities:
      scopes: ["roadmap-closeout", "merged-zjal-branch", "carrier-issue-closeout"]
      verifiers: ["post-merge-contract", "branch-prefix-allowlist", "fixed-confirmation-phrase"]
      max_side_effect_level: "cleanup"
    evidence_store: "GitHub pull request comment"
    match:
      source: ["pull_request"]
      action: ["closed"]
      merged: [true]
    guards:
      requires_post_merge_contract: true
      report_only_if_contract_missing: true
      requires_no_pending_followups: true
      destructive_actions_enabled: false
      allowed_consumer: "post-merge-cleanup"
      allowed_mode: "roadmap-closeout"
      branch_prefix_allowlist: ["zjal/"]
      close_carrier_issue_only: true
      auto_merge: false
    dedupe_window: "pr_number"
    failure_owner: "post-merge-cleanup"
    human_gate: "only when contract is missing, invalid, ambiguous, or asks for broader cleanup"
